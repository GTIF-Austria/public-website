# .github/workflows/preview.yml
name: Deploy PR previews

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-preview:
    runs-on: ubuntu-24.04
    env:
      EODASH_OPENCAGE: ${{ secrets.EODASH_OPENCAGE }}
    permissions:
      contents: write
      pages: write
      pull-requests: write
    steps:
      # This checks out "main" first for Check for changes step
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Check for changes to prevent modification of build scripts
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          # Define what is "unsafe" to change
          filters: |
            unsafe_files:
              - 'package.json'
              - 'package-lock.json'
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # Not needed if lastUpdated is not enabled
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4
      - if: steps.filter.outputs.unsafe_files == 'false'
        name: Install dependencies
        run: npm ci
      - if: steps.filter.outputs.unsafe_files == 'false'
        name: Build with VitePress with correct base
        run: npm run build -- --base /pr-preview/pr-${{ github.event.number }}/
      - name: Deploy preview to Github Pages
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: .vitepress/dist
